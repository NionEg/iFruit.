<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WhatsUp - Переписка</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-whatsup.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>
        
        <div class="status-bar dark-status">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span>📶</span><span>📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content chat-body">
            
            <div class="chat-header">
                <div class="header-left">
                    <div class="chat-back-arrow" onclick="window.location.href='whatsup.html'">‹</div>
                    <img src="lucia.jpg" class="header-avatar" id="chatAvatar" alt="Аватар">
                    <div class="header-profile-card" id="chatName">Лусия Каминос</div>
                </div>
                <div class="header-right-actions">
                    <div class="action-circle-btn" id="callBtn">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .3l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.6 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="msg-history" id="msgHistory">
                </div>

            <div class="wu-bottom-input-bar">
                <div class="input-bar-inner">
                    <span class="input-icon-btn">😊</span>
                    <input type="text" class="wu-message-input" id="messageInput" placeholder="Сообщение">
                    <span class="input-icon-btn">📎</span>
                    <span class="input-icon-btn">📷</span>
                </div>
            </div>

        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator dark-indicator"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Считываем, чей чат открыть из параметров URL (?chat=lucia или ?chat=cal)
            const urlParams = new URLSearchParams(window.location.search);
            const currentChat = urlParams.get('chat') || 'lucia';

            const chatAvatar = document.getElementById('chatAvatar');
            const chatName = document.getElementById('chatName');
            const msgHistory = document.getElementById('msgHistory');
            const messageInput = document.getElementById('messageInput');
            const callBtn = document.getElementById('callBtn');

            // Привязываем вызов к нужному человеку
            callBtn.onclick = () => {
                window.location.href = `calling.html?chat=${currentChat}`;
            };

            // База сообщений строго по переданным текстам
            const chatData = {
                lucia: {
                    name: "Лусия Каминос",
                    avatar: "lucia.jpg",
                    messages: [
                        { type: 'in', text: 'Джейсон, ты где завис? Смит сказал, что тачки готовы. Жду тебя на парковке у порта.', time: '16:00' },
                        { type: 'out', text: 'Уже еду, детка. Проверял, не сели ли нам на хвост копы после вчерашнего. На районе подозрительно много патрулей.', time: '16:01' },
                        { type: 'in', text: 'Забудь про патрули, нам нужен этот фургон. Если упустим время, товар уедет на склад, и мы останемся с пустыми карманами. Ты взял то, о чем я просила?', time: '16:05' },
                        { type: 'out', text: 'Стволы в багажнике, маски тоже. Но у меня плохое предчувствие насчет этого парня, Смита. Он слишком легко согласился сдать нам маршрут.', time: '16:05' },
                        { type: 'in', text: 'Мы пройдем через это вместе, как и всегда. Доверяй мне. Просто держи палец на спусковом крючке и не отставай.', time: '16:09' },
                        { type: 'out', text: 'Всегда за твоей спиной, Лу. Буду через две минуты. Включай зажигание.', time: '16:15' }
                    ]
                },
                cal: {
                    name: "Кэл Хэмптон",
                    avatar: "cal.jpg",
                    messages: [
                        { type: 'in', text: 'Слыш, Джейсон. Тот парень из Вайс-Сити, про которого ты говорил... Он чистый? Мне не нужны городские пижоны, которые обделаются при первом шуме поршней.', time: '09:10' },
                        { type: 'out', text: 'Кал, расслабься. Человек проверенный. Он знает, как перевозить груз через болота и не попасться патрулям. Главное — вовремя подготовь тачки.', time: '09:15' },
                        { type: 'in', text: 'Тачки готовы. Подвеску задрали, протектор что надо — по грязи пойдут как по маслу. Но если твоя подружка Люсия снова начнет задавать лишние вопросы про мои «налоги», сделка отменяется. Я работаю по своим правилам.', time: '09:18' },
                        { type: 'out', text: 'Люсия просто считает долю. Без неё мы бы до сих пор скидывали товар за копейки местным шерифам. Короче, во сколько быть на месте?', time: '09:22' },
                        { type: 'in', text: 'Жду вас на старой лодочной станции на окраине болот после полуночи. Привезите аванс наличкой. И без хвоста, Дюваль. Мои ребята караулят на въезде с карабинами.', time: '09:22' },
                        { type: 'out', text: 'Будем в 00:30. Не паникуй, Кэл. Всё пройдет гладко, если твои люди не начнут палить во всё, что движется.', time: '09:23' },
                        { type: 'in', text: 'Если это не копы и не аллигаторы — мы не стреляем. До связи.', time: '09:25' }
                    ]
                }
            };

            const data = chatData[currentChat] || chatData.lucia;
            chatName.textContent = data.name;
            chatAvatar.src = data.avatar;

            // Отрисовка чата
            function renderMessages() {
                msgHistory.innerHTML = '';
                data.messages.forEach(msg => {
                    const container = document.createElement('div');
                    container.className = `bubble-container ${msg.type}`;
                    
                    container.innerHTML = `
                        <div class="bubble-msg">
                            <p style="margin:0; word-break:break-word;">${msg.text}</p>
                            <div class="msg-meta-box">
                                <span class="msg-time">${msg.time}</span>
                                ${msg.type === 'out' ? '<span class="msg-status-tick">✓✓</span>' : ''}
                            </div>
                        </div>
                    `;
                    msgHistory.appendChild(container);
                });
                // Плавный скролл к самому последнему сообщению
                msgHistory.scrollTop = msgHistory.scrollHeight;
            }

            // Функция отправки сообщения игроком
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text) return;

                const now = new Date();
                const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                data.messages.push({
                    type: 'out',
                    text: text,
                    time: currentTime
                });

                messageInput.value = '';
                renderMessages();
            }

            // Отправка по нажатию кнопки Enter
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Первичный рендер сообщений при открытии
            renderMessages();
        });
    </script>
</body>
</html>
