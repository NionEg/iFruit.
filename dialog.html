<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsUp - Диалог</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="phone-container">
        <div class="dynamic-island"></div>

        <div class="status-bar dark-status-bar" id="global-status-bar">
            <div class="status-time">00:00</div>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <div class="battery-container"><div class="battery-level"></div></div>
            </div>
        </div>

        <div class="screen-content light-bg-app">
            <div class="dialog-header">
                <i class="fa-solid fa-chevron-left back-btn" onclick="location.href='whatsup.html'"></i>
                <h2>Лусия ❤️</h2>
            </div>
            <div class="chat-messages">
                <div class="message incoming"><div class="bubble-text">Джейсон, ты где пропал? Нам нужно проверить снаряжение.</div></div>
                <div class="message outgoing"><div class="bubble-text">Всегда за твоей спиной, Лу. Буду через две минуты.</div></div>
            </div>
        </div>

        <div class="home-indicator-bar" onclick="location.href='index.html'">
            <div class="home-indicator" style="background-color: #000000;"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
