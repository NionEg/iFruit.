<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WhatsUp - Сообщения</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-whatsup.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>
        <div class="status-bar dark-status">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span>📶</span><span>📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content wu-bg">
            <div class="wu-top-bar">
                <span class="iphone-back-btn" onclick="window.location.href='index.html'">‹ Назад</span>
                <h1 class="wu-main-title">Сообщения</h1>
                <div class="wu-more-menu">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="wu-search-container">
                <div class="wu-search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Поиск чатов" readonly>
                </div>
            </div>

            <div class="chats-list">
                <div class="chat-row" onclick="window.location.href='dialog.html?chat=lucia'">
                    <div class="avatar-container">
                        <img src="lucia.jpg" class="avatar-img" alt="Лусия Каминос">
                    </div>
                    <div class="chat-details-box">
                        <div class="chat-row-header">
                            <span class="chat-name">Лусия Каминос</span>
                            <span class="chat-status-tick">✓</span>
                        </div>
                        <p class="chat-preview">Всегда за твоей спиной, Лу. Буду через две минуты. Включай зажигание.</p>
                    </div>
                </div>

                <div class="chat-row" onclick="window.location.href='dialog.html?chat=cal'">
                    <div class="avatar-container">
                        <img src="cal.jpg" class="avatar-img" alt="Кэл Хэмптон">
                    </div>
                    <div class="chat-details-box">
                        <div class="chat-row-header">
                            <span class="chat-name">Кэл Хэмптон</span>
                            <span class="chat-status-tick">✓</span>
                        </div>
                        <p class="chat-preview">Принял. Буду на месте. Спасибо, Кэл.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator dark-indicator"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
