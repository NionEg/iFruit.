<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WhatsUp - Звонок</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-phone.css">
    <style>
        /* Локальное переопределение для неонового стиля звонка WhatsUp */
        .wu-call-bg {
            background: linear-gradient(180deg, #1a081e 0%, #00e5ff 100%) !important;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 20px;
            color: white;
            height: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .wu-call-avatar {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            object-fit: cover;
            border: 3px solid #ffffff;
            margin: 40px auto 20px auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            display: block;
        }
        .wu-caller-name {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 4px;
        }
        .wu-call-status {
            font-size: 15px;
            color: #00f0ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>
        
        <div class="status-bar">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span>📶</span><span>📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content wu-call-bg">
            <div>
                <img src="lucia.jpg" class="wu-call-avatar" id="callAvatar" alt="Аватар">
                <h2 class="wu-caller-name" id="callName">Лусия Каминос</h2>
                <p class="wu-call-status">WhatsUp Аудиозвонок...</p>
            </div>

            <div class="call-actions">
                <div class="decline-btn" id="hangUpBtn">🔴</div>
            </div>
        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const currentChat = urlParams.get('chat') || 'lucia';

            const callAvatar = document.getElementById('callAvatar');
            const callName = document.getElementById('callName');
            const hangUpBtn = document.getElementById('hangUpBtn');

            // Соответствие имен и картинок
            const profiles = {
                lucia: { name: "Лусия Каминос", avatar: "lucia.jpg" },
                cal: { name: "Кэл Хэмптон", avatar: "cal.jpg" }
            };

            const activeProfile = profiles[currentChat] || profiles.lucia;
            callName.textContent = activeProfile.name;
            callAvatar.src = activeProfile.avatar;

            // При нажатии на красную кнопку возвращаем пользователя именно в тот чат, откуда он звонил
            hangUpBtn.onclick = () => {
                window.location.href = `dialog.html?chat=${currentChat}`;
            };
        });
    </script>
</body>
</html>
