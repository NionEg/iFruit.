<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="phone-container" style="background-color: #f2f2f7;">
        <div class="dynamic-island"></div>

        <div class="screen-content">
            <div class="status-bar dark-status-bar">
                <div class="status-time">00:00</div>
                <div class="status-icons">
                    <i class="fa-solid fa-signal"></i>
                    <i class="fa-solid fa-wifi"></i>
                    <div class="battery-container">
                        <div class="battery-level"></div>
                    </div>
                </div>
            </div>

            <div class="settings-header">
                <i class="fa-solid fa-chevron-left back-btn" onclick="location.href='index.html'"></i>
                <h1 class="settings-title">Настройки</h1>
            </div>

            <div class="settings-scroll-container">
                <div class="settings-profile-card">
                    <img src="lucia.jpg" alt="Lucia" class="profile-avatar">
                    <div class="profile-info">
                        <span class="profile-name">Lucia</span>
                        <span class="profile-subtitle">iFruit ID, iCloud+, контент и покупки</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </div>

                <div class="settings-group">
                    <div class="settings-item">
                        <div class="settings-item-left">
                            <div class="icon-box orange-bg"><i class="fa-solid fa-plane"></i></div>
                            <span class="item-title">Авиарежим</span>
                        </div>
                        <label class="ios-switch"><input type="checkbox" id="airplane-mode"><span class="slider"></span></label>
                    </div>
                    <div class="settings-item clickable">
                        <div class="settings-item-left">
                            <div class="icon-box blue-bg"><i class="fa-solid fa-wifi"></i></div>
                            <span class="item-title">Wi-Fi</span>
                        </div>
                        <div class="settings-item-right"><span class="item-value">Vice City Net</span><i class="fa-solid fa-chevron-right arrow-icon"></i></div>
                    </div>
                    <div class="settings-item clickable">
                        <div class="settings-item-left">
                            <div class="icon-box blue-bg"><i class="fa-solid fa-bluetooth"></i></div>
                            <span class="item-title">Bluetooth</span>
                        </div>
                        <div class="settings-item-right"><span class="item-value">Вкл.</span><i class="fa-solid fa-chevron-right arrow-icon"></i></div>
                    </div>
                    <div class="settings-item clickable">
                        <div class="settings-item-left">
                            <div class="icon-box green-bg"><i class="fa-solid fa-signal"></i></div>
                            <span class="item-title">Сотовая связь</span>
                        </div>
                        <div class="settings-item-right"><i class="fa-solid fa-chevron-right arrow-icon"></i></div>
                    </div>
                </div>

                <div class="settings-group">
                    <div class="settings-item clickable">
                        <div class="settings-item-left">
                            <div class="icon-box red-bg"><i class="fa-solid fa-bell"></i></div>
                            <span class="item-title">Уведомления</span>
                        </div>
                        <div class="settings-item-right"><i class="fa-solid fa-chevron-right arrow-icon"></i></div>
                    </div>
                    <div class="settings-item clickable">
                        <div class="settings-item-left">
                            <div class="icon-box red-bg"><i class="fa-solid fa-volume-high"></i></div>
                            <span class="item-title">Звуки, тактильные сигналы</span>
                        </div>
                        <div class="settings-item-right"><i class="fa-solid fa-chevron-right arrow-icon"></i></div>
                    </div>
                </div>
            </div>

            <div class="home-indicator-bar dark-indicator" onclick="location.href='index.html'">
                <div class="home-indicator"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
