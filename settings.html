<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-settings.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>
        
        <div class="status-bar dark-status">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span id="status-airplane" class="hidden-indicator">✈️</span>
                <span id="status-signal-1" class="signal-icon">📶</span>
                <span id="status-signal-2" class="signal-icon">📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content st-bg">
            <div class="st-nav">
                <span class="st-back" onclick="window.location.href='index.html'">‹ Назад</span>
            </div>

            <div class="st-scroll">
                <h1 class="st-main-title">Настройки</h1>

                <div class="st-block profile-item">
                    <img src="lucia.jpg" class="avatar" alt="Lucia" onerror="this.src='user.jpg';">
                    <div class="p-meta">
                        <h2>Lucia Camino</h2>
                        <p>iFruit ID, iCloud+, контент и покупки</p>
                    </div>
                    <span class="arrow">›</span>
                </div>

                <div class="st-block rows-list">
                    <div class="row-line">
                        <div class="badge orange">✈️</div>
                        <span class="name">Авиарежим</span>
                        <label class="toggle">
                            <input type="checkbox" id="airplane-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="row-line">
                        <div class="badge blue">🌐</div>
                        <span class="name">Wi-Fi</span>
                        <span class="val" id="settings-wifi-val">ViceCity_Net</span>
                        <span class="arrow">›</span>
                    </div>
                    <div class="row-line">
                        <div class="badge green">📶</div>
                        <span class="name">Сотовая связь</span>
                        <span class="val" id="settings-cellular-val">Вкл.</span>
                        <span class="arrow">›</span>
                    </div>
                </div>

                <div class="st-block rows-list">
                    <div class="row-line">
                        <div class="badge red">🔔</div>
                        <span class="name">Уведомления</span>
                        <span class="arrow">›</span>
                    </div>
                    <div class="row-line">
                        <div class="badge purple">🔊</div>
                        <span class="name">Звуки, тактильные сигналы</span>
                        <span class="arrow">›</span>
                    </div>
                    <div class="row-line">
                        <div class="badge bright-blue">☀️</div>
                        <span class="name">Экран и яркость</span>
                        <span class="arrow">›</span>
                    </div>
                    <div class="row-line">
                        <div class="badge gray">⚙️</div>
                        <span class="name">Основные</span>
                        <span class="arrow">›</span>
                    </div>
                </div>

                <div class="st-block rows-list">
                    <div class="row-line">
                        <div class="badge hand-blue">✋</div>
                        <span class="name">Конфиденциальность и безопасность</span>
                        <span class="arrow">›</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator dark-indicator"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
