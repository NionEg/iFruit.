<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>iFruit OS - Домой</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>

        <div class="status-bar">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span>📶</span><span>📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content home-bg">
            <div class="widgets-area">
                <div class="widget weather-wdg" onclick="window.location.href='weather.html'">
                    <div class="wdg-city">Vice City</div>
                    <div class="wdg-temp">35°</div>
                </div>
                <div class="widget news-wdg">
                    <img src="news.jpg" alt="News">
                </div>
            </div>

            <div class="apps-grid">
                <div class="app-icon-item" onclick="window.location.href='whatsup.html'">
                    <div class="icon-shape icon-img-box">
                        <img src="WhatsUp.jpg" alt="WhatsUp" class="app-pure-img">
                    </div>
                    <span class="app-label">WhatsUp</span>
                </div>
                <div class="app-icon-item" onclick="window.location.href='lifeinvader.html'">
                    <div class="icon-shape icon-li">LIFE</div>
                    <span class="app-label">LifeInvader</span>
                </div>
                <div class="app-icon-item" onclick="window.location.href='fruitpay.html'">
                    <div class="icon-shape icon-img-box">
                        <img src="FruitPay.jpg" alt="FruitPay" class="app-pure-img">
                    </div>
                    <span class="app-label">FruitPay</span>
                </div>
                <div class="app-icon-item" onclick="window.location.href='settings.html'">
                    <div class="icon-shape icon-st">⚙️</div>
                    <span class="app-label">Настройки</span>
                </div>
            </div>

            <div class="dock-container">
                <div class="dock-wrapper">
                    <div class="dock-item btn-call" onclick="window.location.href='phone.html'">
                        <img src="phone-icon.jpg" class="dock-pure-img" alt="Phone" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size: 26px;">📞</span>
                    </div>
                    <div class="dock-item btn-srch">🔍</div>
                    <div class="dock-item btn-chat" onclick="window.location.href='whatsup.html'">💬</div>
                    <div class="dock-item btn-gear" onclick="window.location.href='settings.html'">⚙️</div>
                </div>
            </div>
        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
