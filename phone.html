<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-phone.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>
        <div class="status-bar dark-status">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span>📶</span><span>📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content ph-bg">
            <div class="ph-header">
                <span class="ph-back" onclick="window.location.href='index.html'">‹</span>
                <h1 class="ph-title">Контакты</h1>
            </div>
            <div class="contacts-list">
                <div class="contact-card" onclick="window.location.href='calling.html'">
                    <img src="lucia.jpg" class="c-avatar" alt="Lucia">
                    <div class="c-info">
                        <h3>Лусия ❤️</h3>
                        <p>Мобильный</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator dark-indicator"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
