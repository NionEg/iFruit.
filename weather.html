<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="phone-container">
        <div class="dynamic-island"></div>

        <div class="status-bar" id="global-status-bar">
            <div class="status-time">00:00</div>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <div class="battery-container"><div class="battery-level"></div></div>
            </div>
        </div>

        <div class="screen-content weather-bg-app">
            <div class="weather-header">
                <i class="fa-solid fa-chevron-left back-btn" onclick="location.href='index.html'"></i>
                <h2>Погода</h2>
            </div>
            <div class="weather-main">
                <div class="main-city">Vice City</div>
                <div class="main-temp">38°</div>
                <div class="main-condition">Солнечно</div>
                <div class="high-low">Макс: 40°, Мин: 29°</div>
            </div>
            <div class="weather-section">
                <h3>Прогноз по часам</h3>
                <div class="hourly-scroll">
                    <div class="hourly-item"><span>Сейчас</span><i class="fa-solid fa-sun" style="color: #ffcc00;"></i><span>38°</span></div>
                    <div class="hourly-item"><span>15:00</span><i class="fa-solid fa-sun" style="color: #ffcc00;"></i><span>40°</span></div>
                    <div class="hourly-item"><span>16:00</span><i class="fa-solid fa-sun" style="color: #ffcc00;"></i><span>39°</span></div>
                </div>
            </div>
        </div>

        <div class="home-indicator-bar" onclick="location.href='index.html'">
            <div class="home-indicator" style="background-color: #ffffff;"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
