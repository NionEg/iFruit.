<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Погода</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app-weather.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="dynamic-island"></div>
        
        <div class="status-bar weather-status">
            <div class="status-time" id="clock">00:00</div>
            <div class="status-indicators">
                <span>📶</span><span>📶</span>
                <div class="battery-container"><div class="battery-level" id="batteryLevel"></div></div>
            </div>
        </div>

        <div class="screen-content weather-main">
            <div class="w-nav">
                <span class="w-back" onclick="window.location.href='index.html'">‹ Назад</span>
            </div>

            <div class="weather-header">
                <h1 class="w-city">Vice City</h1>
                <p class="w-temp">38°</p>
                <p class="w-desc">Солнечно</p>
                <p class="w-limits">Макс: 40°, Мин: 29°</p>
            </div>

            <div class="hourly-forecast">
                <h3>Прогноз по часам</h3>
                <div class="hours-row">
                    <div class="hour-item"><span>Сейчас</span><span>☀️</span><span>38°</span></div>
                    <div class="hour-item"><span>15:00</span><span>☀️</span><span>40°</span></div>
                    <div class="hour-item"><span>16:00</span><span>☀️</span><span>39°</span></div>
                </div>
            </div>

            <div class="daily-forecast">
                <h3>Прогноз на 7 дней</h3>
                <div class="days-list">
                    <div class="day-row">
                        <span class="day-name">Пн</span>
                        <span class="day-icon">☀️</span>
                        <span class="day-temp">29° / 40°</span>
                    </div>
                    <div class="day-row">
                        <span class="day-name">Вт</span>
                        <span class="day-icon">🌤️</span>
                        <span class="day-temp">30° / 39°</span>
                    </div>
                    <div class="day-row">
                        <span class="day-name">Ср</span>
                        <span class="day-icon">☀️</span>
                        <span class="day-temp">31° / 41°</span>
                    </div>
                    <div class="day-row">
                        <span class="day-name">Чт</span>
                        <span class="day-icon">⛅</span>
                        <span class="day-temp">30° / 38°</span>
                    </div>
                    <div class="day-row">
                        <span class="day-name">Пт</span>
                        <span class="day-icon">🌦️</span>
                        <span class="day-temp">28° / 35°</span>
                    </div>
                    <div class="day-row">
                        <span class="day-name">Сб</span>
                        <span class="day-icon">☀️</span>
                        <span class="day-temp">29° / 37°</span>
                    </div>
                    <div class="day-row">
                        <span class="day-name">Вс</span>
                        <span class="day-icon">🌤️</span>
                        <span class="day-temp">30° / 39°</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="home-indicator-zone" onclick="window.location.href='index.html'">
            <div class="home-indicator"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
